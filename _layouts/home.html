---
layout: default
---
{{ content }}

<nav>
  <ul>
    {% for page in site.pages %}
      {% if page.path contains "blog/en/" %}
        <li>
          <a href="{{ page.url | relative_url }}">
            {{ page.title }}
          </a>
        </li>
      {% endif %}
    {% endfor %}
  </ul>
</nav>
