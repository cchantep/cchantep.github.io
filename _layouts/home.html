---
layout: default
---
{{ content }}


{% assign posts = site.pages
  | where_exp: "p", "p.path contains 'blog/en/'"
  | sort: "date"
  | reverse
%}

<h2>✍️ Posts</h2>

<nav>
  <ul>
    {% for post in posts %}
      <li>
        <a href="{{ page.url | relative_url }}">{{ page.title }}</a> ({{ page.date }})
      </li>
    {% endfor %}
  </ul>
</nav>
