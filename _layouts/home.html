---
layout: default
---
{{ content }}


{% assign posts = site.pages
  | where_exp: "p", "p.path contains 'blog/en/'"
  | sort: "date"
  | reverse
%}

<h2>✍️ Posts</h2>

<nav>
  <ul>
    {% for post in posts %}
      <li>
        <a href="{{ blog.url | relative_url }}">{{ blog.title }}</a>

        <time datetime="{{ post.date | date_to_xmlschema }}">
          {{ post.date | date: "%Y-%m-%d" }}
        </time>
      </li>
    {% endfor %}
  </ul>
</nav>
